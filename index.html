<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta http-equiv="refresh" content="6;url=https://far-pennsylvania-council-platinum.trycloudflare.com">
  <title>Conectando ao Análise de Produtos</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes progress { from { width: 4%; } to { width: 100%; } }
    @keyframes float { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-7px); } }
    .loading-progress { animation: progress 2.8s cubic-bezier(.22,1,.36,1) forwards; }
    .floating-logo { animation: float 1.8s ease-in-out infinite; }
  </style>
</head>
<body class="min-h-screen overflow-hidden bg-slate-950 text-slate-100 antialiased">
  <div class="pointer-events-none fixed inset-0">
    <div class="absolute -left-24 -top-24 h-80 w-80 rounded-full bg-indigo-600/30 blur-3xl"></div>
    <div class="absolute -bottom-28 -right-20 h-96 w-96 rounded-full bg-cyan-500/20 blur-3xl"></div>
    <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,transparent_0%,rgba(2,6,23,.7)_75%)]"></div>
  </div>
  <main class="relative flex min-h-screen items-center justify-center p-5">
    <section class="w-full max-w-md rounded-3xl border border-white/10 bg-white/[.07] p-7 text-center shadow-2xl shadow-indigo-950/50 backdrop-blur-xl sm:p-9">
      <div class="floating-logo mx-auto flex h-20 w-20 items-center justify-center rounded-3xl border border-indigo-300/30 bg-gradient-to-br from-indigo-500 to-cyan-500 shadow-lg shadow-indigo-500/30">
        <svg class="h-10 w-10 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 7h16M7 4v6m10-6v6M5 10h14v10H5z"/><path stroke-linecap="round" d="M8 14h3m2 0h3m-8 3h8"/></svg>
      </div>
      <p class="mt-6 text-xs font-black uppercase tracking-[.24em] text-indigo-300">Análise de Produtos</p>
      <h1 class="mt-2 text-2xl font-black tracking-tight text-white">Preparando seu acesso</h1>
      <p id="loadingMessage" class="mt-3 text-sm leading-relaxed text-slate-300">Localizando o servidor online mais recente...</p>
      <div class="mt-7 overflow-hidden rounded-full border border-white/10 bg-slate-900/70 p-1">
        <div class="h-2 rounded-full bg-slate-800"><div class="loading-progress h-full rounded-full bg-gradient-to-r from-indigo-500 via-violet-400 to-cyan-400 shadow-[0_0_14px_rgba(34,211,238,.55)]"></div></div>
      </div>
      <div class="mt-4 flex items-center justify-center gap-2 text-xs font-semibold text-slate-400">
        <span class="relative flex h-2.5 w-2.5"><span class="absolute inline-flex h-full w-full animate-ping rounded-full bg-emerald-400 opacity-75"></span><span class="relative inline-flex h-2.5 w-2.5 rounded-full bg-emerald-400"></span></span>
        Conexão segura em andamento
      </div>
      <a href="https://far-pennsylvania-council-platinum.trycloudflare.com" class="mt-7 inline-flex items-center justify-center rounded-xl border border-white/15 bg-white/10 px-4 py-2.5 text-xs font-bold text-white transition hover:bg-white/20">Acessar agora</a>
      <p class="mt-4 text-[11px] text-slate-500">Você será direcionado automaticamente.</p>
    </section>
  </main>
<script>
  const target = "https://far-pennsylvania-council-platinum.trycloudflare.com";
  window.setTimeout(() => { document.getElementById('loadingMessage').textContent = 'Servidor encontrado. Abrindo o sistema...'; }, 1200);
  window.setTimeout(() => { window.location.replace(target); }, 2800);
</script>
</body></html>
